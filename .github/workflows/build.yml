# 这是注释，不会被执行，只是给人看的说明
# --------------------------
# 1. 工作流名称（给你自己看的，方便识别）
name: SonarQube代码扫描

# 2. 什么时候自动执行这个扫描？
on:
  push:
    branches: [ main ]  # 当你把代码推送到「main」分支时，自动扫描
  pull_request:
    branches: [ main ]  # 当别人发起代码合并请求时，也自动扫描

# 3. 要执行的具体任务
jobs:
  sonarcloud:  # 任务ID（随便起，不影响功能）
    name: SonarQube扫描  # 任务的显示名称
    runs-on: ubuntu-latest  # 在「Ubuntu最新版」服务器上运行（GitHub免费提供）

    steps:  # 任务里的具体步骤
      # 步骤1：把你的代码从GitHub拉到服务器上
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 必须写0，让SonarQube能分析完整的代码历史

      # 步骤2：执行SonarQube代码质量扫描
      - name: 执行SonarQube扫描
        uses: SonarSource/sonarcloud-github-action@master  # 官方提供的扫描工具
        env:
          # GitHub自动生成的令牌，用来访问你的仓库
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 你刚才添加的SonarQube令牌，用来把结果上传到SonarQube网站
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
